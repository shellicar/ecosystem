name: Publish

# Publish one already-built package to npm: restore its dist from the build
# artifact, verify its changelog and version, and publish. There is no build
# here — build-package already produced the dist.
on:
  workflow_call:
    inputs:
      package-dir:
        description: Path to the package to publish, relative to the repo root
        required: true
        type: string
      version:
        description: Version from the release tag
        required: true
        type: string
      artifact:
        description: Name of the dist artifact produced by build-package
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org/
      - run: pnpm i --frozen-lockfile

      - name: Restore dist
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact }}
          path: ${{ inputs.package-dir }}/dist

      - name: Verify changelog
        env:
          PACKAGE_DIR: ${{ inputs.package-dir }}
          VERSION: ${{ inputs.version }}
        run: |
          CHANGELOG="$PACKAGE_DIR/CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "❌ No CHANGELOG.md found in $PACKAGE_DIR"
            exit 1
          fi
          # Strip pre-release suffix to get the base version (1.0.0-alpha.5 → 1.0.0)
          BASE_VERSION=$(echo "$VERSION" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          FIRST_VERSION=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' "$CHANGELOG" | head -n1 | sed 's/## \[\(.*\)\]/\1/')
          if [ -z "$FIRST_VERSION" ]; then
            echo "✅ No version entries yet — OK for pre-release"
            exit 0
          fi
          if [ "$BASE_VERSION" != "$FIRST_VERSION" ]; then
            echo "❌ First changelog entry [$FIRST_VERSION] does not match release base version [$BASE_VERSION]"
            exit 1
          fi
          if ! grep -qE "^## \[$BASE_VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" "$CHANGELOG"; then
            echo "❌ Entry ## [$BASE_VERSION] is missing a date (expected: ## [$BASE_VERSION] - YYYY-MM-DD)"
            exit 1
          fi
          echo "✅ Changelog OK"

      - uses: ./.github/actions/publish-package
        with:
          package-dir: ${{ inputs.package-dir }}
          version: ${{ inputs.version }}
