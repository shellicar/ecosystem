name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # actions/checkout needs this to clone
      id-token: write  # OIDC token for npm provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" != *"@"* ]]; then
            echo "❌ Tag '$TAG' is not in package@version format"
            exit 1
          fi
          PACKAGE_NAME="${TAG%%@*}"
          VERSION="${TAG#*@}"
          echo "package=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME"
          echo "Version: $VERSION"

      - name: Install GitVersion
        run: |
          curl -sL https://github.com/GitTools/GitVersion/releases/download/6.6.0/gitversion-linux-x64-6.6.0.tar.gz -o /tmp/gitversion.tar.gz
          tar xzf /tmp/gitversion.tar.gz -C /usr/local/bin gitversion
          chmod +x /usr/local/bin/gitversion

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm audit
      - run: pnpm i --frozen-lockfile
      - run: pnpm run --if-present build --only
      - run: pnpm run --if-present type-check --only
      - run: pnpm run --if-present test --only
      - run: pnpm run ci

      - name: Resolve package directory
        id: package
        env:
          PACKAGE_NAME: ${{ steps.tag.outputs.package }}
        run: |
          PACKAGE_DIR=$(node -e "
            const fs = require('fs');
            const name = process.env.PACKAGE_NAME;
            const dirs = ['packages']
              .flatMap(d => fs.readdirSync(d).map(p => d + '/' + p))
              .filter(d => { try { fs.statSync(d + '/package.json'); return true; } catch { return false; } });
            const match = dirs.find(d => {
              const pkg = JSON.parse(fs.readFileSync(d + '/package.json', 'utf8'));
              return pkg.name.split('/').pop() === name;
            });
            if (!match) { process.stderr.write('No package found for: ' + name + '\\n'); process.exit(1); }
            process.stdout.write(match);
          ")
          echo "dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "Package directory: $PACKAGE_DIR"


      - name: Verify changelog
        run: |
          CHANGELOG="${{ steps.package.outputs.dir }}/CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "❌ No CHANGELOG.md found in ${{ steps.package.outputs.dir }}"
            exit 1
          fi
          # Strip pre-release suffix to get base version (e.g. 1.0.0-alpha.5 → 1.0.0)
          BASE_VERSION=$(echo "${{ steps.tag.outputs.version }}" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          FIRST_VERSION=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' "$CHANGELOG" | head -n1 | sed 's/## \[\(.*\)\]/\1/')
          if [ -z "$FIRST_VERSION" ]; then
            echo "✅ No version entries yet — OK for pre-release"
            exit 0
          fi
          if [ "$BASE_VERSION" != "$FIRST_VERSION" ]; then
            echo "❌ First changelog entry [$FIRST_VERSION] does not match release base version [$BASE_VERSION]"
            exit 1
          fi
          if ! grep -qE "^## \[$BASE_VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" "$CHANGELOG"; then
            echo "❌ Entry ## [$BASE_VERSION] is missing a date (expected: ## [$BASE_VERSION] - YYYY-MM-DD)"
            exit 1
          fi
          echo "✅ Changelog OK"

      - name: Verify version matches tag
        run: |
          cd "${{ steps.package.outputs.dir }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          echo "package.json version: $PKG_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch"
            exit 1
          fi
          echo "✅ Versions match"

      - name: Publish
        run: |
          . ./scripts/get-npm-tag.sh
          cd "${{ steps.package.outputs.dir }}"
          VERSION=$(node -p "require('./package.json').version")
          TAG=$(get_npm_tag "$VERSION")
          if [ $? -ne 0 ]; then
            echo "Failed to get valid npm tag: $TAG"
            exit 1
          fi
          echo "Publishing with tag: $TAG"
          pnpm publish --provenance --ignore-scripts --no-git-checks --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
