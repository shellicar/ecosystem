name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test (e.g. build-clean@1.4.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # actions/checkout needs this to clone
      id-token: write  # OIDC token for npm provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [[ "$TAG" != *"@"* ]]; then
            echo "❌ Tag '$TAG' is not in package@version format"
            exit 1
          fi
          PACKAGE_NAME="${TAG%%@*}"
          VERSION="${TAG#*@}"
          echo "package=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME"
          echo "Version: $VERSION"

      - name: Install GitVersion
        run: |
          curl -sL https://github.com/GitTools/GitVersion/releases/download/6.6.0/gitversion-linux-x64-6.6.0.tar.gz -o /tmp/gitversion.tar.gz
          tar xzf /tmp/gitversion.tar.gz -C /usr/local/bin gitversion
          chmod +x /usr/local/bin/gitversion

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm audit
      - run: pnpm i --frozen-lockfile

      - name: Resolve package directory
        id: package
        env:
          PACKAGE_NAME: ${{ steps.tag.outputs.package }}
        run: |
          PACKAGE_DIR="packages/$PACKAGE_NAME"
          if [ ! -f "$PACKAGE_DIR/package.json" ]; then
            echo "❌ No package.json found at $PACKAGE_DIR"
            exit 1
          fi
          ACTUAL_NAME=$(node -p "require('./$PACKAGE_DIR/package.json').name")
          EXPECTED_NAME="@shellicar/$PACKAGE_NAME"
          if [ "$ACTUAL_NAME" != "$EXPECTED_NAME" ]; then
            echo "❌ Package name mismatch: expected $EXPECTED_NAME, got $ACTUAL_NAME"
            exit 1
          fi
          echo "✅ Package verified: $ACTUAL_NAME at $PACKAGE_DIR"
          echo "dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm turbo build --filter=./packages/${{ steps.tag.outputs.package }}...

      - name: Type check
        run: pnpm turbo type-check --filter=./packages/${{ steps.tag.outputs.package }}...

      - name: Test
        run: pnpm turbo test --filter=./packages/${{ steps.tag.outputs.package }}...

      - name: Lint
        run: pnpm exec biome ci --diagnostic-level=error .

      - name: Verify changelog
        run: |
          CHANGELOG="${{ steps.package.outputs.dir }}/CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "❌ No CHANGELOG.md found in ${{ steps.package.outputs.dir }}"
            exit 1
          fi
          # Strip pre-release suffix to get base version (e.g. 1.0.0-alpha.5 → 1.0.0)
          BASE_VERSION=$(echo "${{ steps.tag.outputs.version }}" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          FIRST_VERSION=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' "$CHANGELOG" | head -n1 | sed 's/## \[\(.*\)\]/\1/')
          if [ -z "$FIRST_VERSION" ]; then
            echo "✅ No version entries yet — OK for pre-release"
            exit 0
          fi
          if [ "$BASE_VERSION" != "$FIRST_VERSION" ]; then
            TAG_VERSION="${{ steps.tag.outputs.version }}"
            if [[ "$TAG_VERSION" == *-* ]]; then
              echo "✅ Pre-release ($TAG_VERSION) — changelog entry for $BASE_VERSION not required yet"
              exit 0
            fi
            echo "❌ First changelog entry [$FIRST_VERSION] does not match release base version [$BASE_VERSION]"
            exit 1
          fi
          if ! grep -qE "^## \[$BASE_VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" "$CHANGELOG"; then
            echo "❌ Entry ## [$BASE_VERSION] is missing a date (expected: ## [$BASE_VERSION] - YYYY-MM-DD)"
            exit 1
          fi
          echo "✅ Changelog OK"

      - name: Verify version matches tag
        run: |
          cd "${{ steps.package.outputs.dir }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          echo "package.json version: $PKG_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch"
            exit 1
          fi
          echo "✅ Versions match"

      - name: Publish
        run: |
          . ./scripts/get-npm-tag.sh
          cd "${{ steps.package.outputs.dir }}"
          VERSION=$(node -p "require('./package.json').version")
          TAG=$(get_npm_tag "$VERSION")
          if [ $? -ne 0 ]; then
            echo "Failed to get valid npm tag: $TAG"
            exit 1
          fi
          echo "Publishing with tag: $TAG"
          DRY_RUN=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DRY_RUN="--dry-run"
            echo "⚠️ Dry run: workflow_dispatch trigger"
          fi
          pnpm publish --provenance --ignore-scripts --no-git-checks --tag "$TAG" $DRY_RUN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
