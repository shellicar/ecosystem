name: Publish package
description: >
  Verify a package's version matches the release tag, verify its changelog, decide
  its dist-tag channel, and publish it to npm. Requires pnpm and Node already set
  up in the calling job, with npm OIDC (id-token: write) for provenance.
inputs:
  package-dir:
    description: Path to the package to publish, relative to the repo root
    required: true
  version:
    description: Version from the release tag, verified against the package's package.json
    required: true
runs:
  using: composite
  steps:
    - name: Verify changelog
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
        VERSION: ${{ inputs.version }}
      run: |
        CHANGELOG="$PACKAGE_DIR/CHANGELOG.md"
        if [ ! -f "$CHANGELOG" ]; then
          echo "❌ No CHANGELOG.md found in $PACKAGE_DIR"
          exit 1
        fi
        # Strip pre-release suffix to get the base version (1.0.0-alpha.5 → 1.0.0)
        BASE_VERSION=$(echo "$VERSION" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
        FIRST_VERSION=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' "$CHANGELOG" | head -n1 | sed 's/## \[\(.*\)\]/\1/')
        if [ -z "$FIRST_VERSION" ]; then
          echo "✅ No version entries yet — OK for pre-release"
          exit 0
        fi
        if [ "$BASE_VERSION" != "$FIRST_VERSION" ]; then
          if [[ "$VERSION" == *-* ]]; then
            echo "✅ Pre-release ($VERSION) — changelog entry for $BASE_VERSION not required yet"
            exit 0
          fi
          echo "❌ First changelog entry [$FIRST_VERSION] does not match release base version [$BASE_VERSION]"
          exit 1
        fi
        if ! grep -qE "^## \[$BASE_VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" "$CHANGELOG"; then
          echo "❌ Entry ## [$BASE_VERSION] is missing a date (expected: ## [$BASE_VERSION] - YYYY-MM-DD)"
          exit 1
        fi
        echo "✅ Changelog OK"

    - name: Verify version matches tag
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
        VERSION: ${{ inputs.version }}
      run: |
        cd "$PACKAGE_DIR"
        PKG_VERSION=$(node -p "require('./package.json').version")
        echo "package.json version: $PKG_VERSION"
        echo "Tag version:          $VERSION"
        if [ "$PKG_VERSION" != "$VERSION" ]; then
          echo "❌ Version mismatch"
          exit 1
        fi
        echo "✅ Versions match"

    - name: Publish
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
        EVENT: ${{ github.event_name }}
      run: |
        . ./scripts/get-npm-tag.sh
        cd "$PACKAGE_DIR"
        VERSION=$(node -p "require('./package.json').version")
        TAG=$(get_npm_tag "$VERSION")
        if [ $? -ne 0 ]; then
          echo "Failed to get valid npm tag: $TAG"
          exit 1
        fi
        DRY_RUN=""
        if [ "$EVENT" = "workflow_dispatch" ]; then
          DRY_RUN="--dry-run"
          echo "⚠️ Dry run: workflow_dispatch trigger"
        fi
        echo "Publishing $PACKAGE_DIR with tag: $TAG"
        pnpm publish --provenance --ignore-scripts --no-git-checks --tag "$TAG" $DRY_RUN
